<!DOCTYPE html>
<html lang="id">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Latihan 4 - Validasi Form Nama</title>

    <link rel="stylesheet" href="../style.css">

</head>

<body>

<div class="container">

    <div class="card">

        <h1>✅ Latihan 4</h1>

        <p class="subtitle">
            Validasi Form Nama Menggunakan JavaScript
        </p>

        <div class="form-group">

            <label>Masukkan Nama</label>

            <input
                type="text"
                id="namaValidasi"
                placeholder="Contoh: Panca Buana Putra">

        </div>

        <button onclick="cekNama()">

            ✔ Validasi Nama

        </button>

        <div class="hasil">

            <h3 id="hasilValidasi">

                Silakan masukkan nama terlebih dahulu.

            </h3>

        </div>

    </div>

</div>

<script src="../script.js"></script>

</body>
</html>
