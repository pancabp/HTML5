<!DOCTYPE html>
<html lang="id">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Latihan 3 - Kalkulator Penjumlahan</title>

    <link rel="stylesheet" href="../style.css">

</head>
<body>

<div class="container">

    <div class="card">

        <h1>🧮 Latihan 3</h1>

        <p class="subtitle">
            Program Penjumlahan Menggunakan JavaScript
        </p>

        <div class="form-group">

            <label>Angka Pertama</label>

            <input
                type="number"
                id="angka1"
                placeholder="Masukkan angka pertama">

            <label>Angka Kedua</label>

            <input
                type="number"
                id="angka2"
                placeholder="Masukkan angka kedua">

        </div>

        <button onclick="jumlahkan()">

            ➕ Hitung Jumlah

        </button>

        <div class="hasil">

            <h3 id="hasilJumlah">

                Hasil : -

            </h3>

        </div>

    </div>

</div>

<script src="../script.js"></script>

</body>
</html>
