<!DOCTYPE html>
<html lang="id">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Latihan 2 - Menampilkan Biodata</title>

    <link rel="stylesheet" href="../style.css">

</head>
<body>

<div class="container">

    <div class="card">

        <h1>👤 Latihan 2</h1>

        <p class="subtitle">
            Menampilkan Biodata Menggunakan JavaScript DOM
        </p>

        <div class="form-group">

            <label>Nama</label>
            <input
                type="text"
                id="bioNama"
                placeholder="Masukkan nama">

            <label>NIM</label>
            <input
                type="text"
                id="bioNim"
                placeholder="Masukkan NIM">

            <label>Jurusan</label>
            <input
                type="text"
                id="bioJurusan"
                placeholder="Masukkan jurusan">

            <label>Semester</label>
            <input
                type="number"
                id="bioSemester"
                placeholder="Masukkan semester">

        </div>

        <button onclick="tampilkanBiodata()">

            📄 Tampilkan Biodata

        </button>

        <div id="hasilBiodata" class="hasil">

            <p>Data biodata akan muncul di sini.</p>

        </div>

    </div>

</div>

<script src="../script.js"></script>

</body>
</html>
